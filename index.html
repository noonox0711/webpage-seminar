<style>
  html,body{margin:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;

  .box{width:min(92vw,380px);background:#fff;border:1px solid #EAE0D5;border-radius:18px;

function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function dec(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ENC.iv)},key,b64d(ENC.ct));
  return new TextDecoder().decode(pt);
}
async function unlock(pw){try{const html=await dec(pw);try{sessionStorage.setItem('dpw',pw);}catch(e){}document.open();document.write(html);document.close();return true;}catch(e){return false;}}
document.getElementById('f').addEventListener('submit',async function(e){e.preventDefault();
  const pw=document.getElementById('pw').value.trim().toLowerCase();if(!pw)return;
  const ok=await unlock(pw);
  if(!ok){document.getElementById('e').textContent='비밀번호가 맞지 않아요.';document.getElementById('pw').value='';document.getElementById('pw').focus();}
});
(function(){try{const s=sessionStorage.getItem('dpw');if(s){unlock(s);}}catch(e){}})();
